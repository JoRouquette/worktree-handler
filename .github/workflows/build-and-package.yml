name: Build and Package

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build-and-package:
    name: Lint → Test → Package .vsix → Upload
    runs-on: ubuntu-latest

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Checkout release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Quality gates ──────────────────────────────────────────────────────

      - name: Lint (ESLint)
        run: npm run lint

      - name: Compile tests (tsc → out/)
        run: npm run compile-tests

      - name: Test (headless VS Code via Xvfb)
        # Tests are stubs in MVP — kept as quality gate, non-blocking for now
        run: xvfb-run -a npm test
        continue-on-error: true

      # ── Build & Package ────────────────────────────────────────────────────

      - name: Package extension (.vsix)
        # vsce runs vscode:prepublish (webpack production build) automatically
        run: npx @vscode/vsce package --no-dependencies

      # ── Artifacts & Checksums ──────────────────────────────────────────────

      - name: Compute SHA256 checksums
        id: checksums
        run: |
          VSIX_FILE=$(ls *.vsix)
          BUNDLE_FILE="dist/extension.js"

          echo ""
          echo "=== SHA256 Checksums ==="
          sha256sum "$VSIX_FILE"
          sha256sum "$BUNDLE_FILE"
          echo "========================"
          echo ""

          VSIX_SHA=$(sha256sum "$VSIX_FILE"   | awk '{print $1}')
          BUNDLE_SHA=$(sha256sum "$BUNDLE_FILE" | awk '{print $1}')

          echo "vsix_file=$VSIX_FILE"     >> "$GITHUB_OUTPUT"
          echo "vsix_sha256=$VSIX_SHA"    >> "$GITHUB_OUTPUT"
          echo "bundle_sha256=$BUNDLE_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload .vsix to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            "${{ steps.checksums.outputs.vsix_file }}" \
            --clobber

      - name: Append checksum table to release notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VSIX="${{ steps.checksums.outputs.vsix_file }}"
          VSIX_SHA="${{ steps.checksums.outputs.vsix_sha256 }}"
          BUNDLE_SHA="${{ steps.checksums.outputs.bundle_sha256 }}"

          # Download existing release notes
          gh release view "$TAG" --json body -q '.body' > /tmp/release_notes.md

          # Append checksum section
          {
            echo ""
            echo "---"
            echo "## Artifacts"
            echo ""
            echo "| File | SHA256 |"
            echo "|------|--------|"
            echo "| \`${VSIX}\` | \`${VSIX_SHA}\` |"
            echo "| \`dist/extension.js\` | \`${BUNDLE_SHA}\` |"
          } >> /tmp/release_notes.md

          gh release edit "$TAG" --notes-file /tmp/release_notes.md
          echo "Checksums appended to release $TAG."

      # ── Archive for debugging ──────────────────────────────────────────────

      - name: Upload .vsix as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.checksums.outputs.vsix_file }}
          path: ${{ steps.checksums.outputs.vsix_file }}
          retention-days: 30
