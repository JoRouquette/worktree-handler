name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Parse commits → bump SemVer → publish release
    runs-on: ubuntu-latest

    steps:
      # ── Setup ──────────────────────────────────────────────────────────────

      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # ── Version resolution ─────────────────────────────────────────────────

      - name: Get latest tag
        id: latest_tag
        run: |
          LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest tag: ${LATEST:-none}"

      - name: Parse commits and compute next version
        id: semver
        run: |
          set -euo pipefail

          LATEST_TAG="${{ steps.latest_tag.outputs.tag }}"
          CONFIG=".release-config.json"

          # ── Commit range ──
          if [ -z "$LATEST_TAG" ]; then
            RANGE="HEAD"
            NEW_VERSION=$(jq -r '.initialVersion' "$CONFIG")
            IS_INITIAL=true
          else
            RANGE="${LATEST_TAG}..HEAD"
            IS_INITIAL=false
          fi

          # ── Collect hashes ──
          mapfile -t HASHES < <(git log --pretty=format:"%H" $RANGE 2>/dev/null || true)

          if [ ${#HASHES[@]} -eq 0 ]; then
            echo "No new commits since ${LATEST_TAG:-the beginning}"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          BUMP="none"
          BREAKING_SECTION=""
          FEAT_SECTION=""
          PATCH_SECTION=""

          for HASH in "${HASHES[@]}"; do
            SUBJECT=$(git log --format="%s" -n 1 "$HASH")
            BODY=$(git log    --format="%b" -n 1 "$HASH")

            # MAJOR — exclamation-mark syntax OR BREAKING CHANGE footer
            if echo "$SUBJECT" | grep -qE '^[a-zA-Z]+(\(.+\))?!:' || \
               echo "$BODY"    | grep -qE '^BREAKING CHANGE:'; then
              BUMP="major"
              BREAKING_SECTION="${BREAKING_SECTION}  - ${SUBJECT}"$'\n'

            # MINOR — feat only
            elif echo "$SUBJECT" | grep -qE '^feat(\(.+\))?:'; then
              [ "$BUMP" != "major" ] && BUMP="minor"
              FEAT_SECTION="${FEAT_SECTION}  - ${SUBJECT}"$'\n'

            # PATCH — fix, build, ci, refactor, perf, style, test
            elif echo "$SUBJECT" | grep -qE '^(fix|build|ci|refactor|perf|style|test)(\(.+\))?:'; then
              [ "$BUMP" = "none" ] && BUMP="patch"
              PATCH_SECTION="${PATCH_SECTION}  - ${SUBJECT}"$'\n'

            # IGNORED — docs, chore (and anything else)
            fi
          done

          if [ "$BUMP" = "none" ]; then
            echo "Only docs/chore commits — no release triggered"
            echo "released=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # ── Compute version ──
          if [ "$IS_INITIAL" = "false" ]; then
            CURRENT="${LATEST_TAG#v}"
            V_MAJOR=$(echo "$CURRENT" | cut -d. -f1)
            V_MINOR=$(echo "$CURRENT" | cut -d. -f2)
            V_PATCH=$(echo "$CURRENT" | cut -d. -f3)

            case "$BUMP" in
              major) NEW_VERSION="$((V_MAJOR+1)).0.0" ;;
              minor) NEW_VERSION="${V_MAJOR}.$((V_MINOR+1)).0" ;;
              patch) NEW_VERSION="${V_MAJOR}.${V_MINOR}.$((V_PATCH+1))" ;;
            esac
          fi

          echo "released=true"            >> "$GITHUB_OUTPUT"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP"              >> "$GITHUB_OUTPUT"
          echo "Bump strategy: $BUMP → v$NEW_VERSION"

          # ── Build changelog (written to file to avoid multiline escaping) ──
          {
            echo "## What's Changed in v${NEW_VERSION}"
            echo ""
            if [ -n "$BREAKING_SECTION" ]; then
              echo "### Breaking Changes"
              echo "$BREAKING_SECTION"
            fi
            if [ -n "$FEAT_SECTION" ]; then
              echo "### Features"
              echo "$FEAT_SECTION"
            fi
            if [ -n "$PATCH_SECTION" ]; then
              echo "### Fixes & Improvements"
              echo "$PATCH_SECTION"
            fi
            echo "---"
            printf "_Generated by [release.yml](.github/workflows/release.yml) "
            printf "using custom Conventional Commits rules "
            printf "([.release-config.json](.release-config.json))._\n"
          } > /tmp/changelog.md

          echo ""
          echo "=== Changelog preview ==="
          cat /tmp/changelog.md

      # ── Version commit ─────────────────────────────────────────────────────

      - name: Update package.json version
        if: steps.semver.outputs.released == 'true'
        run: |
          VERSION="${{ steps.semver.outputs.new_version }}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json
          git add package.json
          # Skip if nothing changed (re-run on same version)
          git diff --cached --quiet \
            || git commit -m "chore: bump version to $VERSION [skip ci]"

      - name: Push version commit
        if: steps.semver.outputs.released == 'true'
        run: git push

      # ── Tag & Release ──────────────────────────────────────────────────────

      - name: Create Git tag
        if: steps.semver.outputs.released == 'true'
        run: |
          VERSION="${{ steps.semver.outputs.new_version }}"
          git tag "v${VERSION}"
          git push origin "v${VERSION}"

      - name: Create GitHub Release
        if: steps.semver.outputs.released == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.semver.outputs.new_version }}"
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --notes-file /tmp/changelog.md
          echo "Release v${VERSION} published."
